<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Help</title>
    <style>
        .bg-custom-image {
            /* Pfad zu deinem Bild */
            background-image: url(); 
            /* Bild zentrieren und skalieren, ohne es zu verzerren */
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            /* Falls es ein Full-Screen-Hintergrund sein soll */
            min-height: 100vh; 
        }
    </style>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <div class="container p-lg-5 p-3"> 
        <div class="row row-cols-lg-2 row-cols-1 justify-content-center align-items-center">
            <div class="col-lg-3 col-12">
                <div class="d-flex align-items-center gap-2">
                    <img src="images/chat-left.svg">
                    <h5 class="text-primary text">Destek</h5>
                </div>
                <h3>Sorularınız için bizimle iletişime geçmekten cekinmeyin.</h3>
            </div>
            <div class="col-lg-9 col-12  m-lg-0 m-5">
                <div class="row row-cols-lg-2 row-cols-sm-1 gx-5 gy-5">
                    <div class="col d-flex justify-content-center align-items-center" >
                        <div class="box d-flex border border-2 border-dark-subtle  bg-dark justify-content-center align-items-center p-lg-5 p-4">
                            <img style="width: 40px !important; height: auto !important;" src="images/envelope.svg">
                        </div>
                        <div class="container">
                            <h5>İletişim Formu</h5>
                            <p>İletişim formunu doldurarak bize ulaşın.</p> 
                        </div>
                        <button type="button" class="btn btn-primary rounded-circle d-inline-flex border-5 border-primary-subtle justify-content-center align-items-center" style="width: 45px; height: 45px;">
                            <img src="images/arrow-right.svg">
                        </button>
                    </div>

                    <div class="col d-flex justify-content-center align-items-center">
                        <div class="box d-flex border border-2 border-dark-subtle  bg-dark justify-content-center align-items-center p-lg-5 p-4">
                            <img style="width: 40px !important; height: auto !important;" src="images/question-circle.svg">
                        </div>
                        <div class="container ">
                            <h5>S.S.S</h5>
                            <p>Sayfayı ziyaret edin ve neye ihtiyacınızın olduğunu öğrenin.</p> 
                        </div>
                        <button type="button" class="btn btn-primary rounded-circle d-inline-flex border-5 border-primary-subtle justify-content-center align-items-center" style="width: 45px; height: 45px;">                           
                            <img src="images/arrow-right.svg">
                        </button>
                    </div>

                    <div class="col d-flex justify-content-center align-items-center">
                        <div class="box d-flex border border-2 border-dark-subtle  bg-dark justify-content-center align-items-center p-lg-5 p-4">
                            <img style="width: 40px !important; height: auto !important;" src="images/telephone.svg">
                        </div>
                        <div class="container ">
                            <h5>Telefon</h5>
                            <p>Bize ulaşın 444 47 58</p> 
                        </div>
                        <button type="button" class="btn btn-primary rounded-circle d-inline-flex border-5 border-primary-subtle justify-content-center align-items-center" style="width: 45px; height: 45px;">                            
                            <img src="images/arrow-right.svg">
                        </button>
                    </div>
                    
                    <div class="col d-flex justify-content-center align-items-center">
                        <div class="box d-flex border border-2 border-dark-subtle  bg-dark justify-content-center align-items-center p-lg-5 p-4">
                            <img style="width: 40px !important; height: auto !important;" src="images/shop-window.svg">
                        </div>
                        <div class="container ">
                            <h5>Mağaza / Bayi Bul</h5>
                            <p>Size en yakın mağzayı bulun</p> 
                        </div>
                        <button type="button" class="btn btn-primary rounded-circle d-inline-flex border-5 border-primary-subtle justify-content-center align-items-center" style="width: 45px; height: 45px;">                            
                            <img src="images/arrow-right.svg">
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
